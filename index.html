<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LensView</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
      text-align: center;
    }
    .hero-img {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(255,255,255,0.3);
      margin-bottom: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    h1 {
      font-size: 3.5rem;
      margin-bottom: 0.3em;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    h2 {
      font-size: 1.8rem;
      opacity: 0.9;
      margin-bottom: 2em;
    }
    p {
      font-size: 1.3rem;
      line-height: 1.6;
      max-width: 700px;
      margin: 0 auto 2em;
    }
    .icons {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 2em 0;
    }
    .icons a {
      color: white;
      font-size: 2.2rem;
      transition: transform 0.3s, opacity 0.3s;
    }
    .icons a:hover {
      transform: scale(1.2);
      opacity: 0.8;
    }
    .btn {
      display: inline-block;
      background: white;
      color: #1e3c72;
      padding: 14px 40px;
      border-radius: 50px;
      font-size: 1.2rem;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      transition: all 0.3s;
      margin-top: 1em;
    }
    .btn:hover {
      background: #f0f0f0;
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    }
    footer {
      margin-top: 4em;
      font-size: 0.9rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Swap this URL with your own photo (upload to GitHub or Imgur) -->
    <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Your Face" class="hero-img">
    
    <h1>LensView</h1>
    <h2>Photography. Vision. No Filter.</h2>
    
    <p> LensView - The Future of MEAL-PREP & Leftovers. Where glass containers meet the Jetsons.</p>
    
    <div class="icons">
           <a href="mailto:lensviewpro@outlook.com"><i class="fas fa-envelope"></i></a>
 
    </div>
    
    <a href="mailto:lensviewpro@outlook.com" class="btn">Join our mailing list for product release and discounts</a>
    
    <footer>"Not your Grandma's Tupperware"</footer>
  </div>
</body>
</html>
