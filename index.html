<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LensView – Premium glass meal prep containers with a futuristic twist. Say goodbye to old-school plastic and hello to smarter leftovers.">
  <title>LensView – The Future of Meal Prep & Leftovers</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
    }
    .hero-img {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(255, 255, 255, 0.3);
      margin-bottom: 24px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
      transition: transform 0.4s ease;
    }
    .hero-img:hover {
      transform: scale(1.05);
    }
    h1 {
      font-size: 3.8rem;
      margin-bottom: 0.2em;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
    }
    h2 {
      font-size: 1.9rem;
      opacity: 0.92;
      margin-bottom: 1.8em;
      font-weight: 400;
    }
    p {
      font-size: 1.35rem;
      line-height: 1.65;
      max-width: 720px;
      margin: 0 auto 2.5em;
      opacity: 0.95;
    }
    .icons {
      display: flex;
      justify-content: center;
      gap: 36px;
      margin: 2.2em 0;
    }
    .icons a {
      color: white;
      font-size: 2.4rem;
      transition: all 0.3s ease;
    }
    .icons a:hover {
      transform: scale(1.25) rotate(8deg);
      opacity: 0.85;
    }
    .btn {
      display: inline-block;
      background: white;
      color: #1e3c72;
      padding: 16px 48px;
      border-radius: 50px;
      font-size: 1.25rem;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
      transition: all 0.35s ease;
      margin: 1.2em 0 2em;
    }
    .btn:hover,
    .btn:focus {
      background: #f5f5f5;
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.45);
      outline: none;
    }
    footer {
      margin-top: 5em;
      font-size: 1rem;
      opacity: 0.75;
      font-style: italic;
    }

    @media (max-width: 600px) {
      h1 { font-size: 2.8rem; }
      h2 { font-size: 1.6rem; }
      p  { font-size: 1.15rem; }
      .hero-img { width: 140px; height: 140px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Replace this src with your actual product image URL -->
    <img 
      class="hero-img" 
      src="https://via.placeholder.com/180/ffffff/1e3c72?text=LensView+Container" 
      alt="LensView futuristic glass meal prep container"
    >

    <h1>LensView</h1>
    <h2>The Future of Meal Prep & Leftovers</h2>

    <p>
      Where premium glass containers meet Jetsons-level style.<br>
      Crystal-clear, durable, eco-friendly — and definitely not your grandma's Tupperware.
    </p>

    <div class="icons">
      <a href="mailto:lensviewpro@outlook.com" aria-label="Email us">
        <i class="fas fa-envelope"></i>
      </a>
      <!-- Add more socials later, e.g.:
      <a href="https://instagram.com/lensviewpro" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
      -->
    </div>

    <a 
      href="mailto:lensviewpro@outlook.com?subject=I'm%20interested%20in%20LensView!&body=Hi%20LensView%20team,%20I'd%20love%20to%20join%20the%20mailing%20list%20for%20updates,%20product%20release%20info,%20and%20early%20discounts."
      class="btn"
    >
      Join the Mailing List – Get Release Updates & Discounts
    </a>

    <footer>"Not your Grandma's Tupperware"</footer>
  </div>
</body>
</html>
